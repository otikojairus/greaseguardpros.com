services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: gaslinerepairpros:latest
    container_name: gaslinerepairpros-web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - NEXT_PUBLIC_SITE_URL=https://gaslinerepairpros.com
    restart: unless-stopped
